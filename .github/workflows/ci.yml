name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Nim Check & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false  # libDaisy not needed for host-side tests

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.8'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install unittest2
        run: nimble install -y unittest2

      - name: Install dependencies
        run: nimble install -d -y

      - name: Syntax check core module
        run: nim check src/nimphea.nim

      - name: Syntax check examples
        run: nimble test

      - name: Run unit tests
        run: nimble test_unit
