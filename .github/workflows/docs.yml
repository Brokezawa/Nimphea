name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build API Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false  # libDaisy not needed (--doccmd:skip)

      - name: Cache nimble
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: ${{ runner.os }}-nimble-v2-${{ hashFiles('*.nimble') }}
          restore-keys: |
            ${{ runner.os }}-nimble-v2-

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.8'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: nimble install -d -y

      - name: Generate API docs
        run: nimble docs

      - name: Convert markdown docs to HTML
        run: |
          # Landing page and root docs → docs/api/ (shares nimdoc.out.css from nimble docs)
          nim md2html --outdir:docs/api/ docs/index.md
          for f in docs/[A-Z]*.md; do
            nim md2html --outdir:docs/api/ "$f"
          done
          # Guides → docs/api/guides/ (preserve subdirectory so relative paths match source)
          mkdir -p docs/api/guides
          cp docs/api/nimdoc.out.css docs/api/guides/
          for f in docs/guides/*.md; do
            nim md2html --outdir:docs/api/guides/ "$f"
          done
          # Fix .md links → .html in all generated HTML so both GitHub markdown
          # preview (.md links in source) and GitHub Pages (.html links served) work
          find docs/api/ -name "*.html" -exec \
            sed -i 's/href="\([^"]*\)\.md\(["#?]\)/href="\1.html\2/g' {} +

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
