# Nim configuration for unit tests
# Tests run on host computer (not embedded ARM target)

# Use default native backend (C)
--backend:c

# Enable all warnings for test code quality
--warnings:on
--hints:on

# Optimize for debug and testing
--debugger:native
--lineDir:on
--stackTrace:on
--linetrace:on

# Define UNIT_TEST macro (like libDaisy does)
# Modules can use when defined(UNIT_TEST) to provide mock implementations
--define:UNIT_TEST

# Path configuration
--path:"../src"
--nimcache:".nimcache"
